<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Current Time Test</title>
</head>
<body>
  <h1>編集中のサイトです。
  <p>完成まで少し待ってね</p>
  </h1>
  <p id="time"></p>

  <script>
    function updateTime() {
      const now = new Date();
      document.getElementById("time").textContent = now.toLocaleString();
    }
    updateTime();
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
